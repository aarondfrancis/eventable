name: Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0 or v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tests:
    uses: ./.github/workflows/tests.yaml

  pint:
    uses: ./.github/workflows/pint.yaml

  release:
    runs-on: ubuntu-latest
    needs: [tests, pint]
    if: github.actor == 'aarondfrancis'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize version input
        id: version
        run: |
          RAW_VERSION="${{ inputs.version }}"
          VERSION="${RAW_VERSION#v}"
          VERSION="${VERSION#V}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '${{ inputs.version }}'. Expected X.Y.Z or vX.Y.Z"
            exit 1
          fi

      - name: Validate changelog (before creating tag)
        run: |
          chmod +x .github/scripts/parse-changelog.sh
          .github/scripts/parse-changelog.sh validate

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          .github/scripts/parse-changelog.sh release "$VERSION"

      - name: Commit and push changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add CHANGELOG.md
          git commit -m "Update changelog for v$VERSION"
          git push

      - name: Create and push tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
